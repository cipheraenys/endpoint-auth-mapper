name: auth-assurance-json

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  evidence-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --require-hashes -r requirements-authmap.txt
      - name: Gate evidence
        run: >-
          authmap --project . --evidence-scan express --format json
          --output authmap-gate.json
          --evidence-policy examples/ci/evidence-policy.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: authmap-gate
          path: authmap-gate.json
