# Endpoint & Auth Mapper — GitHub Actions workflow
#
# Placement of the "service": an on-demand CI gate, not a running daemon. The
# legacy analyzer runs on pull requests, uploads advisory SARIF, and applies the
# backwards-compatible unverified regex gate below.
#
# Copy to: .github/workflows/auth-audit.yml
name: auth-audit

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # required to upload SARIF

jobs:
  authmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install analyzer
        run: pip install ./endpoint-auth-mapper   # adjust path if vendored elsewhere

      # Produce SARIF for the Security tab (never fails the step itself).
      - name: Run auth mapper (SARIF)
        run: |
          authmap --project . --format sarif --output authmap \
                  --report-dir .security-reports || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .security-reports/authmap.sarif

      # Compatibility gate over unverified legacy regex states.
      - name: Enforce legacy inventory gate
        run: |
          authmap --project . --fail-on EXPOSED --min-confidence high \
                  --strict-coverage --baseline .authmap-baseline.json --quiet
