# Project CI: full regression, static checks, packaging, and parser-platform smoke.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: python -m pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: python -m pytest

      - name: Type-check (mypy)
        run: mypy src

      - name: Build
        run: python -m build

      - name: Clean wheel smoke
        shell: bash
        run: |
          python -m venv smoke
          if [ "$RUNNER_OS" = "Windows" ]; then PYTHON="smoke/Scripts/python.exe"; else PYTHON="smoke/bin/python"; fi
          "$PYTHON" -m pip install dist/*.whl
          "$PYTHON" -c "from authmapper.frontends import JavaScriptFrontend, RustFrontend, resolve_ownership; print(JavaScriptFrontend.__name__, RustFrontend.__name__, resolve_ownership.__name__)"
