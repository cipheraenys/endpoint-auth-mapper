name: Record TUI demo

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Install VHS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb
          go install github.com/charmbracelet/vhs@latest
          sudo curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Record demo GIF
        run: xvfb-run --auto-servernum vhs docs/assets/demo.tape

      - name: Upload GIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-gif
          path: docs/assets/demo.gif

      - name: Commit and push GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/demo.gif
          git diff --cached --quiet || git commit -m "docs: generate TUI demo GIF"
          git push
